{% extends 'base.html' %}
{% block title %}Server Error — T&TG Trade Corp{% endblock %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center;">
  <div class="container text-center py-5">
    <div style="font-family:'Cormorant Garamond',serif; font-size:8rem; font-weight:700;
                color:var(--gold); line-height:1; opacity:0.12; margin-bottom:-3rem;">500</div>
    <div style="position:relative; z-index:1;">
      <div class="section-label" style="justify-content:center; margin-bottom:1rem;">Server Error</div>
      <h2 style="font-family:'Cormorant Garamond',serif; color:var(--cream); font-size:2.5rem;">Something Went Wrong</h2>
      <p style="color:var(--muted); max-width:440px; margin:1rem auto 2rem; line-height:1.8;">
        Our team has been notified. Please try again in a few moments or contact us if the problem persists.
      </p>
      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="{% url 'home' %}" class="btn-gold btn">Go to Homepage</a>
        <a href="{% url 'contact' %}" class="btn-outline-gold btn">Contact Support</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
